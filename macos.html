<!DOCTYPE html>
<!--
  ============================================================
  macOS 仿真桌面 — 单文件 HTML
  ============================================================
  使用说明：
  1. 直接用浏览器打开此文件即可运行，无需安装任何依赖
  2. 双击桌面图标打开应用，或点击底部 Dock 栏图标
  3. 窗口左上角红黄绿按钮：关闭 / 最小化 / 全屏
  4. 拖拽标题栏移动窗口，拖拽右下角调整大小
  5. 顶部菜单栏右侧点击控制中心按钮可展开控制中心
  6. 右键桌面弹出上下文菜单
  7. 终端支持命令：help, ls, pwd, cd, echo, date, whoami, clear, uname, open
  8. 计算器支持基本四则运算
  9. 访达支持多级目录导航
  ============================================================
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ========== 全局重置与基础样式 ========== */
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','PingFang SC',sans-serif;font-size:14px;cursor:default}
body{background:#000}

/* ========== 桌面壁纸 ========== */
#desktop{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=1920&q=80') center/cover no-repeat,#1a3a5c;
  overflow:hidden;
}

/* ========== 顶部菜单栏 ========== */
#menubar{
  position:fixed;top:0;left:0;right:0;height:28px;z-index:10000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  font-size:13px;color:#fff;
}
.mb-left{display:flex;align-items:center;gap:2px;height:100%}
.mb-right{display:flex;align-items:center;gap:4px;height:100%}
.mb-item{padding:2px 8px;border-radius:4px;cursor:pointer;transition:background .15s;white-space:nowrap;line-height:22px}
.mb-item:hover{background:rgba(255,255,255,.25)}
.mb-item.active{background:rgba(255,255,255,.3)}
.mb-app-name{font-weight:600}
.mb-icon{font-size:15px;line-height:1}
.mb-right .mb-item{padding:2px 6px;display:flex;align-items:center;gap:2px}
.mb-cc-btn{cursor:pointer;padding:2px 8px;border-radius:4px;display:flex;align-items:center;gap:4px;transition:background .15s}
.mb-cc-btn:hover{background:rgba(255,255,255,.2)}
.mb-cc-btn.active{background:rgba(255,255,255,.25)}

/* ========== 下拉菜单 ========== */
.dropdown-menu{
  position:fixed;top:28px;z-index:10001;
  min-width:220px;padding:4px 0;border-radius:6px;
  background:rgba(245,245,245,.85);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  font-size:13px;color:#222;
  opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .18s ease;
}
.dropdown-menu.show{opacity:1;transform:translateY(0);pointer-events:auto}
.dropdown-item{padding:5px 16px;cursor:pointer;white-space:nowrap;display:flex;justify-content:space-between;align-items:center;border-radius:4px;margin:0 4px}
.dropdown-item:hover{background:#0a84ff;color:#fff}
.dropdown-item.disabled{opacity:.4;pointer-events:none}
.dropdown-sep{height:1px;background:rgba(0,0,0,.12);margin:4px 8px}
.dropdown-shortcut{color:#888;font-size:12px;margin-left:24px}
.dropdown-item:hover .dropdown-shortcut{color:rgba(255,255,255,.7)}

/* ========== 桌面图标 ========== */
.desktop-icon{
  position:absolute;width:84px;height:84px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:6px 2px;border-radius:6px;cursor:pointer;
  transition:background .15s;
}
.desktop-icon:hover{background:rgba(255,255,255,.15)}
.desktop-icon.selected{background:rgba(0,120,255,.3);outline:1px solid rgba(255,255,255,.5)}
.desktop-icon .icon-img{font-size:44px;line-height:1;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.desktop-icon .icon-label{color:#fff;font-size:12px;text-align:center;text-shadow:1px 1px 3px rgba(0,0,0,.9);max-width:80px;word-break:break-word;line-height:1.3}

/* ========== Dock 栏 ========== */
#dock{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:9000;
  display:flex;align-items:flex-end;gap:6px;
  padding:6px 8px 6px 8px;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border:1px solid rgba(255,255,255,.3);
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,.3),inset 0 1px 1px rgba(255,255,255,.3);
}
.dock-item{
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  font-size:38px;cursor:pointer;position:relative;
  transition:transform .2s cubic-bezier(.16,1,.3,1),margin .2s cubic-bezier(.16,1,.3,1);
  transform-origin:bottom center;
}
.dock-item img,.dock-item span{font-size:38px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
.dock-item:hover{transform:scale(1.4);margin:0 10px}
.dock-item:hover .dock-tooltip{opacity:1;transform:translateX(-50%) translateY(0)}
.dock-tooltip{
  position:absolute;bottom:62px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(60,60,60,.92);color:#fff;font-size:12px;
  padding:4px 10px;border-radius:6px;white-space:nowrap;
  opacity:0;transition:all .2s;pointer-events:none;
}
.dock-tooltip::after{
  content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:rgba(60,60,60,.92);
}
.dock-indicator{
  position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,.6);
  opacity:0;transition:opacity .2s;
}
.dock-item.has-win .dock-indicator{opacity:.7}
.dock-sep{width:1px;height:40px;background:rgba(0,0,0,.2);margin:0 4px;align-self:center}

/* ========== 窗口 ========== */
.window{
  position:absolute;min-width:300px;min-height:200px;
  border-radius:12px;overflow:hidden;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(40px) saturate(1.8);-webkit-backdrop-filter:blur(40px) saturate(1.8);
  border:.5px solid rgba(0,0,0,.15);
  box-shadow:0 12px 50px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.15);
  display:flex;flex-direction:column;
  animation:winOpen .25s cubic-bezier(.16,1,.3,1);
}
@keyframes winOpen{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.window.closing{animation:winClose .2s ease forwards}
@keyframes winClose{to{opacity:0;transform:scale(.92)}}
.window.minimizing{animation:winMin .3s cubic-bezier(.16,1,.3,1) forwards}
@keyframes winMin{to{opacity:0;transform:translateY(80vh) scale(.2)}}
.window.fullscreen{border-radius:0!important;border:none}
.win-titlebar{
  height:36px;flex-shrink:0;display:flex;align-items:center;
  padding:0 12px;cursor:grab;position:relative;
  background:rgba(245,245,245,.6);
  border-bottom:.5px solid rgba(0,0,0,.1);
}
.win-titlebar:active{cursor:grabbing}
.win-controls{display:flex;gap:8px;align-items:center}
.win-btn{width:12px;height:12px;border-radius:50%;cursor:pointer;border:none;position:relative;display:flex;align-items:center;justify-content:center}
.win-btn.close{background:#ff5f57}
.win-btn.min{background:#febc2e}
.win-btn.max{background:#28c840}
.win-btn svg{opacity:0;width:8px;height:8px}
.win-controls:hover .win-btn svg{opacity:.6}
.win-title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:600;color:#333;pointer-events:none}
.win-body{flex:1;overflow:auto;position:relative}

/* 窗口 resize */
.win-resize{position:absolute;z-index:5}
.win-resize.r-right{right:0;top:0;width:6px;height:100%;cursor:ew-resize}
.win-resize.r-bottom{bottom:0;left:0;width:100%;height:6px;cursor:ns-resize}
.win-resize.r-left{left:0;top:0;width:6px;height:100%;cursor:ew-resize}
.win-resize.r-corner{width:12px;height:12px;z-index:6}
.win-resize.r-corner.se{right:0;bottom:0;cursor:nwse-resize}
.win-resize.r-corner.sw{left:0;bottom:0;cursor:nesw-resize}
.win-resize.r-corner.ne{right:0;top:0;cursor:nesw-resize}
.win-resize.r-corner.nw{left:0;top:0;cursor:nwse-resize}

/* ========== 控制中心 ========== */
#control-center{
  position:fixed;top:36px;right:8px;z-index:9500;
  width:300px;padding:14px;border-radius:14px;
  background:rgba(245,245,245,.7);
  backdrop-filter:blur(40px) saturate(1.8);-webkit-backdrop-filter:blur(40px) saturate(1.8);
  border:1px solid rgba(255,255,255,.3);
  box-shadow:0 12px 40px rgba(0,0,0,.3);
  opacity:0;pointer-events:none;transform:translateY(-12px) scale(.96);transition:all .25s cubic-bezier(.16,1,.3,1);
}
#control-center.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.cc-card{background:rgba(255,255,255,.6);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.cc-row{display:flex;align-items:center;gap:10px}
.cc-toggle{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:rgba(0,0,0,.08);transition:background .2s;flex-shrink:0;
}
.cc-toggle.on{background:#0a84ff;color:#fff}
.cc-toggle:hover{filter:brightness(1.1)}
.cc-label{font-size:12px;color:#333;font-weight:500}
.cc-slider-wrap{flex:1}
.cc-slider-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.cc-slider-icon{font-size:14px;width:20px;text-align:center}
.cc-slider{
  flex:1;height:24px;border-radius:12px;background:rgba(0,0,0,.1);
  position:relative;cursor:pointer;overflow:hidden;
}
.cc-slider-fill{height:100%;background:#fff;border-radius:12px;position:relative}
.cc-slider-fill::after{content:'';position:absolute;right:6px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ========== 右键菜单 ========== */
#context-menu{
  position:fixed;z-index:10001;min-width:200px;padding:4px 0;border-radius:8px;
  background:rgba(245,245,245,.85);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 8px 30px rgba(0,0,0,.3);
  font-size:13px;color:#222;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
#context-menu.show{opacity:1;pointer-events:auto}
.ctx-item{padding:6px 14px;cursor:pointer;white-space:nowrap;border-radius:4px;margin:0 4px;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:#0a84ff;color:#fff}
.ctx-sep{height:1px;background:rgba(0,0,0,.1);margin:4px 8px}
.ctx-icon{font-size:15px;width:18px;text-align:center}

/* ========== 通知弹窗 ========== */
#notif-area{position:fixed;top:36px;right:12px;z-index:9400;display:flex;flex-direction:column;gap:8px;width:320px}
.notif-card{
  background:rgba(245,245,245,.85);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border:1px solid rgba(255,255,255,.3);border-radius:14px;padding:12px 14px;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  animation:notifIn .4s cubic-bezier(.16,1,.3,1);
}
@keyframes notifIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.notif-card.hide{animation:notifOut .3s ease forwards}
@keyframes notifOut{to{opacity:0;transform:translateX(40px)}}
.notif-title{font-size:13px;font-weight:600;color:#333;margin-bottom:2px}
.notif-body{font-size:12px;color:#666;line-height:1.4}

/* ========== 通用毛玻璃 ========== */
.glass{background:rgba(255,255,255,.7);backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8)}

/* ========== 滚动条 ========== */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.35)}

/* ========== 应用专属样式 ========== */
/* 终端 */
.terminal{background:rgba(30,30,30,.95);color:#e0e0e0;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:13px;padding:12px;line-height:1.5;height:100%;overflow-y:auto}
.terminal-line{white-space:pre-wrap;word-break:break-all}
.terminal-input-line{display:flex;align-items:center}
.terminal-prompt{color:#28c840;margin-right:6px;white-space:nowrap}
.terminal-input{background:none;border:none;outline:none;color:#e0e0e0;font-family:inherit;font-size:inherit;flex:1}

/* 计算器 */
.calc-display{background:#1a1a1a;color:#fff;font-size:42px;text-align:right;padding:16px 20px;font-weight:200;min-height:80px}
.calc-btn{border:none;font-size:22px;cursor:pointer;transition:filter .1s;border-radius:50%;height:64px;display:flex;align-items:center;justify-content:center}
.calc-btn:active{filter:brightness(.8)}
.calc-btn.fn{background:rgba(160,160,160,.6);color:#000}
.calc-btn.op{background:#ff9f0a;color:#fff}
.calc-btn.num{background:rgba(80,80,80,.7);color:#fff}

/* 访达 */
.finder{display:flex;height:100%}
.finder-sidebar{width:180px;background:rgba(235,235,235,.6);padding:8px 0;overflow-y:auto;flex-shrink:0;border-right:.5px solid rgba(0,0,0,.1)}
.finder-side-item{padding:5px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;color:#333;border-radius:6px;margin:1px 4px}
.finder-side-item:hover{background:rgba(0,0,0,.06)}
.finder-side-item.active{background:#0a84ff;color:#fff}
.finder-main{flex:1;padding:12px;overflow-y:auto}
.finder-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid rgba(0,0,0,.1)}
.finder-item{display:flex;flex-direction:column;align-items:center;width:90px;padding:10px 4px;border-radius:8px;cursor:pointer;transition:background .15s}
.finder-item:hover{background:rgba(0,0,0,.06)}
.finder-item .fi-icon{font-size:40px;margin-bottom:4px}
.finder-item .fi-name{font-size:12px;color:#333;text-align:center;word-break:break-word}
.finder-grid{display:grid;grid-template-columns:repeat(auto-fill,90px);gap:4px}

/* 系统设置 */
.settings{display:flex;height:100%}
.settings-sidebar{width:220px;background:rgba(235,235,235,.6);padding:8px 0;overflow-y:auto;flex-shrink:0;border-right:.5px solid rgba(0,0,0,.1)}
.settings-side-item{padding:6px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;color:#333;border-radius:6px;margin:1px 6px}
.settings-side-item:hover{background:rgba(0,0,0,.06)}
.settings-side-item.active{background:#0a84ff;color:#fff}
.settings-main{flex:1;padding:24px;overflow-y:auto}
.settings-section{margin-bottom:20px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:10px;color:#333}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.5);border-radius:8px;margin-bottom:4px}
.settings-toggle{width:40px;height:24px;border-radius:12px;background:rgba(0,0,0,.2);position:relative;cursor:pointer;transition:background .2s}
.settings-toggle.on{background:#28c840}
.settings-toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.settings-toggle.on::after{left:18px}

/* Safari */
.safari-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(235,235,235,.7);border-bottom:.5px solid rgba(0,0,0,.1)}
.safari-nav-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#555;transition:background .15s}
.safari-nav-btn:hover{background:rgba(0,0,0,.08)}
.safari-url{flex:1;height:28px;border-radius:14px;background:rgba(255,255,255,.6);border:1px solid rgba(0,0,0,.1);padding:0 14px;font-size:13px;color:#555;outline:none;text-align:center}
.safari-content{flex:1;overflow:auto;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}

/* 备忘录 */
.notes{display:flex;height:100%}
.notes-sidebar{width:200px;background:rgba(245,245,245,.8);border-right:.5px solid rgba(0,0,0,.1);overflow-y:auto;flex-shrink:0}
.notes-side-item{padding:8px 12px;cursor:pointer;border-bottom:.5px solid rgba(0,0,0,.06);font-size:13px}
.notes-side-item:hover{background:rgba(0,0,0,.04)}
.notes-side-item.active{background:#0a84ff;color:#fff}
.notes-side-title{font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-side-date{font-size:11px;opacity:.7}
.notes-main{flex:1;padding:16px;overflow-y:auto;background:rgba(255,255,255,.6)}
.notes-editor{width:100%;height:100%;border:none;outline:none;resize:none;font-size:14px;line-height:1.6;background:transparent;color:#333;font-family:inherit}

/* 日历 */
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:.5px solid rgba(0,0,0,.1)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex:1;overflow:hidden}
.cal-day-header{text-align:center;padding:6px;font-size:11px;color:#888;font-weight:600;border-bottom:.5px solid rgba(0,0,0,.1)}
.cal-cell{padding:4px 6px;font-size:12px;min-height:40px;cursor:pointer;border:.5px solid rgba(0,0,0,.06);background:rgba(255,255,255,.3)}
.cal-cell:hover{background:rgba(10,132,255,.1)}
.cal-cell.today{background:rgba(255,0,0,.1)}
.cal-cell.other{opacity:.4}
.cal-cell .cal-date{font-weight:600;font-size:13px}
.cal-event{font-size:10px;background:#0a84ff;color:#fff;padding:1px 4px;border-radius:3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 照片 */
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;padding:12px}
.photo-item{aspect-ratio:1;border-radius:8px;cursor:pointer;overflow:hidden;transition:transform .15s}
.photo-item:hover{transform:scale(1.03)}

/* 音乐 */
.music{display:flex;height:100%}
.music-sidebar{width:200px;background:rgba(245,245,245,.7);border-right:.5px solid rgba(0,0,0,.1);padding:12px;overflow-y:auto;flex-shrink:0}
.music-main{flex:1;display:flex;flex-direction:column}
.music-list{flex:1;overflow-y:auto;padding:8px}
.music-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer}
.music-row:hover{background:rgba(0,0,0,.05)}
.music-row.playing{background:rgba(10,132,255,.15)}
.music-playbar{height:64px;background:rgba(235,235,235,.8);border-top:.5px solid rgba(0,0,0,.1);display:flex;align-items:center;padding:0 16px;gap:12px}

/* 地图 */
.map-content{width:100%;height:100%;background:linear-gradient(135deg,#a8d8f0 0%,#c8e6f5 50%,#d4ecf5 100%);position:relative;overflow:hidden}
.map-road{position:absolute;background:rgba(255,255,255,.6)}
.map-label{position:absolute;font-size:11px;color:#555;font-weight:600;text-shadow:0 1px 2px rgba(255,255,255,.8)}

/* 文本编辑 */
.textedit{padding:16px;height:100%;background:rgba(255,255,255,.7)}
.textedit textarea{width:100%;height:100%;border:none;outline:none;resize:none;font-size:14px;line-height:1.6;font-family:inherit;background:transparent}

/* 动画 */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>

<!-- ==================== 桌面 ==================== -->
<div id="desktop">
  <!-- 桌面图标由JS生成 -->
</div>

<!-- ==================== 顶部菜单栏 ==================== -->
<div id="menubar">
  <div class="mb-left">
    <div class="mb-item mb-icon" id="mb-apple">🍎</div>
    <div class="mb-item mb-app-name" id="mb-app-name">访达</div>
    <div class="mb-item" id="mb-file">文件</div>

/* ========== 模块2：桌面图标渲染 ========== */
function renderDesktopIcons() {
  const desktop = document.getElementById('desktop');
  const iconLayer = document.createElement('div');
  iconLayer.style.cssText = 'position:absolute;top:40px;right:20px;display:flex;flex-direction:column;gap:8px;align-items:flex-end';

    iconLayer.appendChild(el);
  });
  desktop.appendChild(iconLayer);

/* ========== 模块3：Dock 栏渲染 ========== */
function renderDock() {
  const dock = document.getElementById('dock');
  DOCK_APPS.forEach(appId => {
    const app = APPS[appId];
    const el = document.createElement('div');
    el.className = 'dock-item';
    el.dataset.app = appId;
    el.innerHTML = `<span>${app.dockIcon}</span><div class="dock-tooltip">${app.name}</div><div class="dock-indicator"></div>`;
    el.addEventListener('click', () => {
      const existing = findWindowByApp(appId);
      if (existing) {
        if (existing.minimized) {
          existing.minimized = false;
          existing.el.style.display = 'flex';
        }
        focusWindow(existing.id);
      } else {
        openWindow(appId);
      }
    });
    dock.appendChild(el);
  });
  /* 分隔线 + 废纸篓 */
  const sep = document.createElement('div');
  sep.className = 'dock-sep';
  dock.appendChild(sep);
  const trash = document.createElement('div');
  trash.className = 'dock-item';
  trash.innerHTML = `<span>🗑️</span><div class="dock-tooltip">废纸篓</div>`;
  dock.appendChild(trash);
}

/* ========== 模块4：窗口管理 ========== */
let winZIndex = 100;
const windows = {};

function findWindowByApp(appId) {
  return Object.values(windows).find(w => w.app === appId && !w.closed);
}

function openWindow(appId) {
  const app = APPS[appId];
  if (!app) return;
  const id = 'win-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
  const w = app.w || 600;
  const h = app.h || 400;
  const offset = Object.keys(windows).length * 28;
  const x = Math.max(10, (window.innerWidth - w) / 2 + offset - 80);
  const y = Math.max(40, (window.innerHeight - h) / 2 + offset - 60);

  const el = document.createElement('div');
  el.className = 'window';
  el.id = id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++winZIndex}`;
  el.innerHTML = `
    <div class="win-titlebar">
      <div class="win-controls">
        <button class="win-btn close" title="关闭"><svg viewBox="0 0 12 12"><path d="M3 3L9 9M9 3L3 9" stroke="#000" stroke-width="1.5" fill="none"/></svg></button>
        <button class="win-btn min" title="最小化"><svg viewBox="0 0 12 12"><path d="M3 6H9" stroke="#000" stroke-width="1.5" fill="none"/></svg></button>
        <button class="win-btn max" title="全屏"><svg viewBox="0 0 12 12"><path d="M4 4L8 8M8 4L4 8" stroke="#000" stroke-width="1" fill="none" opacity="0"/></svg></button>
      </div>
      <div class="win-title">${app.name}</div>
    </div>
    <div class="win-body"></div>
    <div class="win-resize r-right"></div>
    <div class="win-resize r-bottom"></div>
    <div class="win-resize r-left"></div>
    <div class="win-resize r-corner se"></div>
    <div class="win-resize r-corner sw"></div>
    <div class="win-resize r-corner ne"></div>
    <div class="win-resize r-corner nw"></div>
  `;
  document.getElementById('windows').appendChild(el);

  const winData = { id, app:appId, el, minimized:false, maximized:false, closed:false, savedRect:null };
  windows[id] = winData;

  /* 渲染内容 */
  const body = el.querySelector('.win-body');
  renderAppContent(appId, body, id);

  /* 绑定事件 */
  bindWindowEvents(winData);
  focusWindow(id);
  updateDockIndicators();
  updateMenubarApp(appId);
}

function bindWindowEvents(winData) {
  const el = winData.el;

  /* 关闭 */
  el.querySelector('.win-btn.close').addEventListener('click', (e) => {
    e.stopPropagation();
    closeWindow(winData.id);
  });
  /* 最小化 */
  el.querySelector('.win-btn.min').addEventListener('click', (e) => {
    e.stopPropagation();
    minimizeWindow(winData.id);
  });
  /* 全屏 */
  el.querySelector('.win-btn.max').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMaximize(winData.id);
  });

  /* 点击置顶 */
  el.addEventListener('mousedown', () => focusWindow(winData.id));

  /* 拖拽标题栏 */
  const titlebar = el.querySelector('.win-titlebar');
  let dragging = false, dx = 0, dy = 0;
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.win-btn')) return;
    if (el.classList.contains('fullscreen')) return;
    dragging = true;
    dx = e.clientX - el.offsetLeft;
    dy = e.clientY - el.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    el.style.left = Math.max(0, e.clientX - dx) + 'px';
    el.style.top = Math.max(28, e.clientY - dy) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  /* 双击标题栏最大化 */
  titlebar.addEventListener('dblclick', (e) => {
    if (e.target.closest('.win-btn')) return;
    toggleMaximize(winData.id);
  });

  /* Resize */
  el.querySelectorAll('.win-resize').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      if (el.classList.contains('fullscreen')) return;
      e.stopPropagation();
      e.preventDefault();
      const dir = handle.className.replace('win-resize r-','').replace(' r-corner','').trim();
      const startX = e.clientX, startY = e.clientY;
      const startW = el.offsetWidth, startH = el.offsetHeight;
      const startL = el.offsetLeft, startT = el.offsetTop;
      const minW = 300, minH = 200;
      function onMove(ev) {
        let nw = startW, nh = startH, nl = startL, nt = startT;
        if (dir.includes('right') || dir === 'se' || dir === 'ne') nw = Math.max(minW, startW + (ev.clientX - startX));
        if (dir.includes('bottom') || dir === 'se' || dir === 'sw') nh = Math.max(minH, startH + (ev.clientY - startY));
        if (dir === 'left' || dir === 'sw' || dir === 'nw') { nw = Math.max(minW, startW - (ev.clientX - startX)); nl = startL + (startW - nw); }
        if (dir === 'ne' || dir === 'nw' || dir === 'top') { /* top resize optional */ }
        el.style.width = nw + 'px';
        el.style.height = nh + 'px';
        el.style.left = nl + 'px';
        el.style.top = nt + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function focusWindow(id) {
  const w = windows[id];
  if (!w) return;
  Object.values(windows).forEach(win => {
    win.el.style.zIndex = winZIndex;
  });
  w.el.style.zIndex = ++winZIndex;
  updateMenubarApp(w.app);
  updateDockIndicators();
}

function closeWindow(id) {
  const w = windows[id];
  if (!w) return;
  w.el.classList.add('closing');
  w.closed = true;
  setTimeout(() => {
    w.el.remove();
    delete windows[id];
    updateDockIndicators();
    /* 聚焦剩余窗口 */
    const remaining = Object.values(windows).filter(win => !win.closed && !win.minimized);
    if (remaining.length > 0) {
      focusWindow(remaining[remaining.length - 1].id);
    } else {
      updateMenubarApp(null);
    }
  }, 200);
}

function minimizeWindow(id) {
  const w = windows[id];
  if (!w) return;
  w.el.classList.add('minimizing');
  w.minimized = true;
  setTimeout(() => {
    w.el.style.display = 'none';
    w.el.classList.remove('minimizing');
  }, 300);
  updateDockIndicators();
}

function toggleMaximize(id) {
  const w = windows[id];
  if (!w) return;
  if (w.el.classList.contains('fullscreen')) {
    w.el.classList.remove('fullscreen');
    if (w.savedRect) {
      w.el.style.left = w.savedRect.left;
      w.el.style.top = w.savedRect.top;
      w.el.style.width = w.savedRect.width;
      w.el.style.height = w.savedRect.height;
    }
  } else {
    w.savedRect = {
      left: w.el.style.left, top: w.el.style.top,
      width: w.el.style.width, height: w.el.style.height
    };
    w.el.classList.add('fullscreen');
    w.el.style.left = '0px';
    w.el.style.top = '28px';
    w.el.style.width = '100vw';
    w.el.style.height = 'calc(100vh - 28px)';
  }
}

function updateDockIndicators() {
  document.querySelectorAll('.dock-item').forEach(item => {
    const appId = item.dataset.app;
    if (!appId) return;
    const has = Object.values(windows).some(w => w.app === appId && !w.closed);
    item.classList.toggle('has-win', has);
  });
}

function updateMenubarApp(appId) {
  const nameEl = document.getElementById('mb-app-name');
  nameEl.textContent = appId && APPS[appId] ? APPS[appId].name : '访达';
}

function updateTime() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const dateStr = `${now.getMonth()+1}月${now.getDate()}日 周${days[now.getDay()]} ${h}:${m}`;
  document.getElementById('mb-datetime').textContent = dateStr;
}

/* ========== 模块6：控制中心 ========== */
function toggleControlCenter() {
  const cc = document.getElementById('control-center');
  const btn = document.getElementById('mb-cc-toggle');
  cc.classList.toggle('show');
  btn.classList.toggle('active', cc.classList.contains('show'));
}

function initControlCenter() {
  document.getElementById('mb-cc-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleControlCenter();
  });

  /* 开关按钮 */
  ['cc-wifi','cc-bluetooth','cc-dnd','cc-night'].forEach(id => {
    document.getElementById(id).addEventListener('click', (e) => {
      e.stopPropagation();
      e.currentTarget.classList.toggle('on');
    });
  });

  /* 滑块 */
  ['cc-brightness','cc-volume'].forEach(id => {
    const slider = document.getElementById(id);
    const fill = slider.querySelector('.cc-slider-fill');
    let dragging = false;
    function update(e) {
      const rect = slider.getBoundingClientRect();
      let pct = ((e.clientX - rect.left) / rect.width) * 100;
      pct = Math.max(0, Math.min(100, pct));
      fill.style.width = pct + '%';
    }
    slider.addEventListener('mousedown', (e) => { e.stopPropagation(); dragging = true; update(e); });
    document.addEventListener('mousemove', (e) => { if (dragging) update(e); });
    document.addEventListener('mouseup', () => { dragging = false; });
  });

  /* 点击外部关闭 */
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#control-center') && !e.target.closest('#mb-cc-toggle')) {
      document.getElementById('control-center').classList.remove('show');
      document.getElementById('mb-cc-toggle').classList.remove('active');
    }
  });
}

/* ========== 模块7：右键菜单 ========== */
function showContextMenu(x, y, items) {
  const menu = document.getElementById('context-menu');
  menu.innerHTML = '';
  items.forEach(item => {
    if (item.sep) {
      const sep = document.createElement('div');
      sep.className = 'ctx-sep';
      menu.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-item';
      el.innerHTML = `<span class="ctx-icon">${item.icon||''}</span>${item.label}`;
      if (item.action) {
        el.addEventListener('click', () => { item.action(); hideContextMenu(); });
      }
      menu.appendChild(el);
    }
  });
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('show');
}

function hideContextMenu() {
  document.getElementById('context-menu').classList.remove('show');
}

/* ========== 模块8：下拉菜单 ========== */
function showDropdown(anchorEl, items) {
  const menu = document.getElementById('dropdown-menu');
  menu.innerHTML = '';
  items.forEach(item => {
    if (item.sep) {
      const sep = document.createElement('div');
      sep.className = 'dropdown-sep';
      menu.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'dropdown-item' + (item.disabled ? ' disabled' : '');
      el.innerHTML = `${item.label}${item.shortcut ? `<span class="dropdown-shortcut">${item.shortcut}</span>` : ''}`;
      if (item.action && !item.disabled) {
        el.addEventListener('click', () => { item.action(); hideDropdown(); });
      }
      menu.appendChild(el);
    }
  });
  const rect = anchorEl.getBoundingClientRect();
  menu.style.left = rect.left + 'px';
  menu.classList.add('show');
}

function hideDropdown() {
  document.getElementById('dropdown-menu').classList.remove('show');
}

/* ========== 模块9：通知弹窗 ========== */
function showNotification(title, body, duration) {
  duration = duration || 4000;
  const area = document.getElementById('notif-area');
  const card = document.createElement('div');
  card.className = 'notif-card';
  card.innerHTML = `<div class="notif-title">${title}</div><div class="notif-body">${body}</div>`;
  area.appendChild(card);
  setTimeout(() => {
    card.classList.add('hide');
    setTimeout(() => card.remove(), 300);
  }, duration);
}

/* --- 终端 --- */
function renderTerminal(body, winId) {
  body.innerHTML = '<div class="terminal" id="term-' + winId + '"></div>';
  const term = body.querySelector('.terminal');
  const history = [];
  let histIdx = 0;

  function addLine(text) {
    const line = document.createElement('div');
    line.className = 'terminal-line';
    line.textContent = text;
    term.appendChild(line);
  }

  function addInputLine() {
    const user = 'user';
    const host = 'macbook-pro';
    const cwd = '~';
    const prompt = `${user}@${host} ${cwd} %`;
    const line = document.createElement('div');
    line.className = 'terminal-input-line';
    line.innerHTML = `<span class="terminal-prompt">${prompt}</span><input class="terminal-input" type="text" autocomplete="off">`;
    term.appendChild(line);
    const input = line.querySelector('.terminal-input');
    input.focus();
    term.scrollTop = term.scrollHeight;

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = input.value;
        history.push(cmd);
        histIdx = history.length;
        input.disabled = true;
        input.parentElement.style.opacity = '1';
        processCommand(cmd);
        addInputLine();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIdx > 0) { histIdx--; input.value = history[histIdx] || ''; }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx] || ''; }
        else { histIdx = history.length; input.value = ''; }
      }
    });
  }

  function processCommand(cmd) {
    const parts = cmd.trim().split(/\s+/);
    const c = parts[0];
    const args = parts.slice(1);
    switch(c) {
      case 'help':
        addLine('可用命令：ls, pwd, cd, echo, date, whoami, clear, uname, open, help');
        break;
      case 'ls':
        addLine('Applications  Desktop  Documents  Downloads  Movies  Music  Pictures');
        break;
      case 'pwd':
        addLine('/Users/user');
        break;
      case 'cd':
        addLine('');
        break;
      case 'echo':
        addLine(args.join(' '));
        break;
      case 'date':
        addLine(new Date().toString());
        break;
      case 'whoami':
        addLine('user');
        break;
      case 'uname':
        addLine('Darwin macbook-pro 23.0.0 arm64');
        break;
      case 'open':
        if (args[0] === '-a' && args[1]) {
          const appMap = {'safari':'safari','calculator':'calculator','notes':'notes','settings':'settings','finder':'finder','terminal':'terminal','music':'music','maps':'maps'};
          const appId = appMap[args[1].toLowerCase()];
          if (appId) { openWindow(appId); addLine('Opening ' + args[1] + '...'); }
          else addLine('Application not found: ' + args[1]);
        } else { addLine('Usage: open -a <app>'); }
        break;
      case 'clear':
        term.innerHTML = '';
        break;
      case '':
        break;
      default:
        addLine(`zsh: command not found: ${c}`);
    }
    term.scrollTop = term.scrollHeight;
  }

  addLine('Last login: ' + new Date().toLocaleString());
  addLine('Welcome to macOS Terminal (zsh)');
  addLine('Type "help" for available commands.');
  addLine('');
  addInputLine();
}

/* --- 计算器 --- */
function renderCalculator(body) {
  body.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;background:rgba(40,40,40,.9)">
      <div class="calc-display" id="calc-disp">0</div>
      <div style="flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;padding:8px">
        <button class="calc-btn fn" data-key="AC">AC</button>
        <button class="calc-btn fn" data-key="±">±</button>
        <button class="calc-btn fn" data-key="%">%</button>
        <button class="calc-btn op" data-key="÷">÷</button>
        <button class="calc-btn num" data-key="7">7</button>
        <button class="calc-btn num" data-key="8">8</button>
        <button class="calc-btn num" data-key="9">9</button>
        <button class="calc-btn op" data-key="×">×</button>
        <button class="calc-btn num" data-key="4">4</button>
        <button class="calc-btn num" data-key="5">5</button>
        <button class="calc-btn num" data-key="6">6</button>
        <button class="calc-btn op" data-key="−">−</button>
        <button class="calc-btn num" data-key="1">1</button>
        <button class="calc-btn num" data-key="2">2</button>
        <button class="calc-btn num" data-key="3">3</button>
        <button class="calc-btn op" data-key="+">+</button>
        <button class="calc-btn num" data-key="0" style="grid-column:span 2;border-radius:32px">0</button>
        <button class="calc-btn num" data-key=".">.</button>
        <button class="calc-btn op" data-key="=">=</button>
      </div>
    </div>
  `;
  const disp = body.querySelector('#calc-disp');
  let current = '0', prev = null, op = null, justEval = false;

  function update() { disp.textContent = current; }

  body.querySelectorAll('.calc-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      if (k >= '0' && k <= '9') {
        if (current === '0' || justEval) { current = k; justEval = false; }
        else { current += k; }
      } else if (k === '.') {
        if (!current.includes('.')) current += '.';
      } else if (k === 'AC') {
        current = '0'; prev = null; op = null;
      } else if (k === '±') {
        current = String(parseFloat(current) * -1);
      } else if (k === '%') {
        current = String(parseFloat(current) / 100);
      } else if (k === '=') {
        if (prev !== null && op) {
          current = String(calc(parseFloat(prev), parseFloat(current), op));
          prev = null; op = null; justEval = true;
        }
      } else {
        if (prev !== null && op && !justEval) {
          current = String(calc(parseFloat(prev), parseFloat(current), op));
        }
        prev = current; op = k; justEval = true;
      }
      update();
    });
  });

  function calc(a, b, o) {
    switch(o) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? 'Error' : a / b;
    }
    return b;
  }
}

function renderCalendar(body) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dayHeaders = ['日','一','二','三','四','五','六'];
  const events = { [today]: '团队会议 10:00', [today+2]: '项目截止', [today+5]: '生日聚会' };

  body.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;background:rgba(255,255,255,.5)">
      <div class="cal-header">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:20px;font-weight:700">${monthNames[month]}</span>
          <span style="font-size:16px;color:#888">${year}</span>
        </div>
        <div style="display:flex;gap:8px">
          <div class="safari-nav-btn">‹</div>
          <div class="safari-nav-btn">今天</div>
          <div class="safari-nav-btn">›</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:.5px solid rgba(0,0,0,.1)">
        ${dayHeaders.map(d => `<div class="cal-day-header">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">
        ${(() => {
          let cells = '';
          for (let i = firstDay - 1; i >= 0; i--) {
            cells += `<div class="cal-cell other"><div class="cal-date">${daysInPrev - i}</div></div>`;
          }
          for (let d = 1; d <= daysInMonth; d++) {
            const isToday = d === today;
            const ev = events[d];
            cells += `<div class="cal-cell${isToday ? ' today' : ''}"><div class="cal-date">${d}</div>${ev ? `<div class="cal-event">${ev}</div>` : ''}</div>`;
          }
          const totalCells = firstDay + daysInMonth;
          const remaining = (7 - (totalCells % 7)) % 7;
          for (let i = 1; i <= remaining; i++) {
            cells += `<div class="cal-cell other"><div class="cal-date">${i}</div></div>`;
          }
          return cells;
        })()}
      </div>
    </div>
  `;
}

function renderMusic(body, winId) {

  body.innerHTML = `

        <div style="font-size:16px;font-weight:700;margin-bottom:12px">🎵 Apple Music</div>

        <div style="font-size:11px;color:#888;font-weight:600;margin-top:12px;margin-bottom:4px">播放列表</div>
        <div class="finder-side-item">🌟 收藏</div>
        <div class="finder-side-item">😴 助眠</div>
        <div class="finder-side-item">🏃 运动</div>
      </div>
      <div class="music-main">
        <div class="music-list" id="music-list-${winId}"></div>
        <div class="music-playbar">
          <div id="music-info-${winId}" style="flex:1;font-size:13px;color:#888">未播放</div>
          <div class="safari-nav-btn" id="music-prev-${winId}">⏮</div>
          <div class="safari-nav-btn" id="music-play-${winId}" style="font-size:20px">▶</div>
          <div class="safari-nav-btn" id="music-next-${winId}">⏭</div>
        </div>
      </div>
    </div>
  `;

  const list = body.querySelector(`#music-list-${winId}`);
  const info = body.querySelector(`#music-info-${winId}`);
  const playBtn = body.querySelector(`#music-play-${winId}`);

  function renderList() {
    list.innerHTML = MUSIC_DATA.map((song, i) => 
      `<div class="music-row${i === currentSong ? ' playing' : ''}" data-idx="${i}">
        <span style="font-size:20px">🎵</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${song.title}</div><div style="font-size:11px;color:#888">${song.artist}</div></div>
        <span style="font-size:12px;color:#888">${song.duration}</span>
      </div>`
    ).join('');

    list.querySelectorAll('.music-row').forEach(row => {
      row.addEventListener('click', () => {
        currentSong = parseInt(row.dataset.idx);
        isPlaying = true;
        updatePlay();
      });
    });
  }

  function updatePlay() {
    if (currentSong >= 0) {
      const song = MUSIC_DATA[currentSong];
      info.textContent = `${song.title} - ${song.artist}`;
      playBtn.textContent = isPlaying ? '⏸' : '▶';
    }
    renderList();
  }

  playBtn.addEventListener('click', () => {
    if (currentSong < 0) { currentSong = 0; isPlaying = true; }
    else { isPlaying = !isPlaying; }
    updatePlay();
  });
  body.querySelector(`#music-prev-${winId}`).addEventListener('click', () => {
    if (currentSong > 0) { currentSong--; updatePlay(); }
  });
  body.querySelector(`#music-next-${winId}`).addEventListener('click', () => {
    if (currentSong < MUSIC_DATA.length - 1) { currentSong++; updatePlay(); }
  });

  renderList();
}

      { icon:'🔄', label:'整理', action: () => {} },
      { icon:'🖼️', label:'更改桌面背景...', action: () => openWindow('settings') },
      { sep:true },
      { icon:'⚙️', label:'显示设置', action: () => openWindow('settings') },
      { icon:'🔍', label:'在此搜索', action: () => {} },
    ]);
  });

  /* 关闭右键菜单 */
  document.addEventListener('click', hideContextMenu);

  /* 欢迎通知 */
  setTimeout(() => {
    showNotification('欢迎使用 macOS', '双击桌面图标或点击 Dock 栏打开应用');
  }, 800);

  /* 电池显示 */
  document.getElementById('mb-battery').textContent = '🔋 100%';

  console.log('✅ macOS 仿真桌面已加载');
}

// 启动
init();
</script>
</body>
</html>
